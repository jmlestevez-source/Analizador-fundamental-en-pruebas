[build]
  publish = "dist"
  command = "npm run build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Redirect /api/stock/* -> Netlify Function
[[redirects]]
  from = "/api/stock/:ticker"
  to = "/.netlify/functions/stock/:ticker"
  status = 200

# Redirect /api/chart/* -> Netlify Function  
[[redirects]]
  from = "/api/chart/:ticker/:range/:interval"
  to = "/.netlify/functions/chart/:ticker/:range/:interval"
  status = 200

# Redirect /api/search -> Netlify Function
[[redirects]]
  from = "/api/search"
  to = "/.netlify/functions/search"
  status = 200

# Redirect /api/technical -> Netlify Function with query string support
[[redirects]]
  from = "/api/technical"
  to = "/.netlify/functions/technical"
  status = 200

# Redirect /api/technical/* -> Netlify Function
[[redirects]]
  from = "/api/technical/:ticker"
  to = "/.netlify/functions/technical/:ticker"
  status = 200

# SPA fallback: all other routes go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
